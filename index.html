<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>For Bubb 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#1a1118;
  --rose:#c9707a;
  --blush:#f7eded;
  --stone:#f2eeec;
  --mist:#e8e2df;
  --soft:#9b8a8e;
  --white:#fffcfb;
  --cake-base:#f5c6a0;
  --cake-mid:#f0a882;
  --cake-top:#ebb99a;
  --frosting:#fff5f0;
}
html{height:100%;}
body{
  background:var(--stone);
  font-family:'DM Sans',sans-serif;
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── SCREENS ── */
.screen{
  min-height:100vh;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 20px 48px;
}
.screen.active{display:flex;}

/* ── SCREEN 1: INTRO ── */
#s-intro{
  background:var(--ink);
  position:relative;
  overflow:hidden;
  gap:0;
}
#s-intro::before{
  content:'';
  position:absolute;
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(201,112,122,.18) 0%,transparent 70%);
  top:-60px;right:-80px;
  border-radius:50%;
  pointer-events:none;
}
.intro-tag{
  font-size:.68rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--rose);
  margin-bottom:28px;
  animation: pulse-text 2s infinite ease-in-out;
}
@keyframes pulse-text {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}
.intro-divider{
  width:1px;height:48px;
  background:linear-gradient(to bottom,transparent,var(--rose),transparent);
  margin:36px 0;
}

.envelope-wrap{
  cursor:pointer;
  transition:transform .25s;
  position: relative;
}
.envelope-wrap:active{transform:scale(.95);}
.envelope-svg{
  width:200px;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.25));
  animation:env-float 3s ease-in-out infinite;
}
@keyframes env-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}
/* Animasi Flap Amplop */
.envelope-flap {
  transform-origin: center 24px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.envelope-wrap.open .envelope-flap {
  transform: scaleY(-1);
}
/* Kertas surat kecil yang muncul */
.letter-paper {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) scale(0.8);
  width: 140px;
  height: 80px;
  background: #fffcfb;
  border-radius: 4px;
  z-index: -1;
  opacity: 0;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
}
.envelope-wrap.open .letter-paper {
  top: -40px;
  opacity: 1;
}

.dot-bg{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
.dot{
  position:absolute;border-radius:50%;
  background:rgba(201,112,122,.07);
  animation:drift linear infinite;
}
@keyframes drift{
  0%{transform:translateY(110vh) scale(.8);}
  100%{transform:translateY(-20vh) scale(1.1);}
}

/* ── SCREEN 2: GAME ── */
#s-game{
  background:var(--stone);
  gap:0;
  justify-content:flex-start;
  padding-top:28px;
}
.game-header{
  text-align:center;
  margin-bottom:20px;
}
.game-eyebrow{
  font-size:.65rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--soft);
  margin-bottom:6px;
}
.game-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.9rem;
  font-weight:600;
  color:var(--ink);
}
.game-hint{
  font-size:.78rem;
  color:var(--soft);
  margin-top:6px;
  font-weight:300;
}
.reaction-bubble{
  min-height:28px;
  text-align:center;
  font-size:.82rem;
  color:var(--rose);
  font-weight:500;
  margin-bottom:10px;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .3s,transform .3s;
}
.reaction-bubble.show{
  opacity:1;
  transform:translateY(0);
}

.progress-row{
  display:flex;gap:6px;
  margin-bottom:20px;
  width:100%;
  max-width:300px;
}
.pill{
  height:4px;
  flex:1;
  border-radius:99px;
  background:var(--mist);
  transition:background .4s;
}
.pill.filled{background:var(--rose);}

.cake-stage{
  position:relative;
  width:min(300px, 82vw);
  margin:0 auto 20px;
  user-select:none;
}
.cake-svg{
  width:100%;
  filter:drop-shadow(0 12px 28px rgba(0,0,0,.1));
}
.drop-zone{
  position:absolute;
  inset:0;
  border-radius:12px;
}
#placed-toppings{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.placed{
  position:absolute;
  font-size:1.6rem;
  transform:translate(-50%,-50%);
  animation:pop-in .25s cubic-bezier(.34,1.56,.64,1) both;
  pointer-events:none;
}
@keyframes pop-in{
  from{transform:translate(-50%,-50%) scale(0) rotate(-30deg);}
  60%{transform:translate(-50%,-50%) scale(1.25) rotate(8deg);}
  to{transform:translate(-50%,-50%) scale(1) rotate(0deg);}
}

.flame-group{
  cursor:pointer;
  transform-origin:center bottom;
}
.flame-outer{
  animation:flame-sway 1.3s ease-in-out infinite alternate;
  transform-origin:136px 39px;
}
.flame-group[data-flame="1"] .flame-outer{
  transform-origin:164px 39px;
  animation-duration:1.1s;
  animation-delay:.2s;
}
@keyframes flame-sway{
  0%  {transform:scaleX(1)   scaleY(1)    rotate(-4deg); opacity:.9;}
  33% {transform:scaleX(.92) scaleY(1.07) rotate(3deg);  opacity:1;}
  66% {transform:scaleX(1.06) scaleY(.95) rotate(-2deg); opacity:.85;}
  100%{transform:scaleX(.96) scaleY(1.04) rotate(4deg);  opacity:.95;}
}
.flame-mid{
  animation:flame-flicker 0.9s ease-in-out infinite alternate;
  transform-origin:136px 39px;
}
.flame-group[data-flame="1"] .flame-mid{
  transform-origin:164px 39px;
  animation-duration:0.75s;
  animation-delay:.15s;
}
@keyframes flame-flicker{
  0%  {transform:scaleX(1)    scaleY(1)    rotate(-3deg); opacity:.9;}
  50% {transform:scaleX(.88)  scaleY(1.1)  rotate(4deg);  opacity:1;}
  100%{transform:scaleX(1.08) scaleY(.93)  rotate(-5deg); opacity:.8;}
}
.flame-inner{
  animation:flame-core .65s ease-in-out infinite alternate;
  transform-origin:136px 37px;
}
.flame-group[data-flame="1"] .flame-inner{
  transform-origin:164px 37px;
  animation-delay:.3s;
}
@keyframes flame-core{
  0%  {opacity:.7; transform:scaleY(.95);}
  100%{opacity:1;  transform:scaleY(1.08);}
}
.flame-glow{
  animation:glow-pulse 1.6s ease-in-out infinite alternate;
}
@keyframes glow-pulse{
  0%  {opacity:.12; r:9;}
  100%{opacity:.28; r:12;}
}

.flame-group.blown .flame-outer,
.flame-group.blown .flame-mid,
.flame-group.blown .flame-inner,
.flame-group.blown .flame-glow{
  opacity:0 !important;
  animation:none !important;
  transition:opacity .15s;
}
.flame-group.blown{
  animation:candle-wobble .35s ease-out forwards;
}
@keyframes candle-wobble{
  0%{transform:rotate(0deg);}
  25%{transform:rotate(-10deg);}
  55%{transform:rotate(7deg);}
  100%{transform:rotate(0deg);}
}

.smoke-particle{
  position:absolute;
  border-radius:50%;
  background:rgba(180,180,180,.75);
  pointer-events:none;
  animation:smoke-float ease-out forwards;
}
@keyframes smoke-float{
  0%  {opacity:.85; transform:translate(-50%,-50%) scale(.6) rotate(0deg);}
  40% {opacity:.55; transform:translate(calc(-50% + var(--dx)),calc(-50% - 18px)) scale(1.8) rotate(20deg);}
  100%{opacity:0;   transform:translate(calc(-50% + var(--dx2)),calc(-50% - 48px)) scale(3.5) rotate(45deg);}
}

.candle-fx{
  position:absolute;
  transform:translate(-50%,-50%);
  font-size:1.3rem;
  pointer-events:none;
  animation:fx-pop .9s ease-out forwards;
}
@keyframes fx-pop{
  0%{opacity:0; transform:translate(-50%,-50%) scale(.3);}
  30%{opacity:1; transform:translate(-50%,-50%) scale(1.3);}
  100%{opacity:0; transform:translate(-50%,-120%) scale(1);}
}

.candle-hint{
  display:none;
  text-align:center;
  font-size:.82rem;
  color:var(--rose);
  font-weight:500;
  margin-bottom:8px;
  animation:hint-pulse 1.6s ease-in-out infinite;
}
.candle-hint.show{display:block;}
@keyframes hint-pulse{
  0%,100%{opacity:1; transform:scale(1);}
  50%{opacity:.6; transform:scale(.97);}
}

#shelf-wrap{
  transition: opacity 0.4s ease, transform 0.4s ease;
  width: 100%;
}
.shelf-label{
  font-size:.65rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--soft);
  text-align:center;
  margin-bottom:10px;
}
.shelf{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}
.topping-btn{
  width:54px;height:54px;
  border-radius:14px;
  background:var(--white);
  border:1.5px solid var(--mist);
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;
  cursor:pointer;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  -webkit-appearance:none;
  position:relative;
}
.topping-btn.selected{
  border-color:var(--rose);
  box-shadow:0 0 0 3px rgba(201,112,122,.2);
  transform:scale(1.08);
}
.topping-btn.used{
  opacity:.35;
  pointer-events:none;
}

/* ── SCREEN 3: REVEAL ── */
#s-reveal{
  background:var(--ink);
  gap:0;
  overflow:hidden;
  position:relative;
}
#s-reveal::after{
  content:'';
  position:absolute;
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(201,112,122,.15) 0%,transparent 70%);
  bottom:-40px;left:-60px;
  border-radius:50%;
  pointer-events:none;
}
.reveal-cake{
  font-size:5.5rem;
  margin-bottom:24px;
  animation:wiggle 1.2s ease-in-out infinite;
}
@keyframes wiggle{
  0%,100%{transform:rotate(-4deg);}
  50%{transform:rotate(4deg);}
}
.reveal-eyebrow{
  font-size:.68rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--rose);
  margin-bottom:16px;
}
.reveal-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(3rem,12vw,5rem);
  font-weight:400;
  color:var(--white);
  line-height:1;
  text-align:center;
  margin-bottom:8px;
}
.reveal-name em{font-style:italic;}
.reveal-divider{
  width:40px;height:1.5px;
  background:var(--rose);
  margin:20px auto;
}

/* Styling untuk pesan reveal (fade in effect) */
.reveal-msg{
  font-size:.92rem;
  line-height:1.85;
  color:rgba(255,255,255,.65);
  text-align:center;
  max-width:300px;
  font-weight:300;
  opacity: 0; /* Mulai dari transparan */
  transform: translateY(15px);
  transition: opacity 1.8s ease, transform 1.8s ease;
}
.reveal-msg.show {
  opacity: 1;
  transform: translateY(0);
}
.reveal-msg strong{
  color:var(--white);
  font-weight:500;
}
.reveal-msg .highlight {
  color: var(--rose);
  font-weight: 500;
  font-style: italic;
}

.btn-replay{
  margin-top:28px;
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;
  color:var(--rose);
  border:1.5px solid rgba(201,112,122,.4);
  border-radius:999px;
  padding:12px 28px;
  font-family:'DM Sans',sans-serif;
  font-size:.82rem;
  font-weight:500;
  letter-spacing:.06em;
  cursor:pointer;
  transition:border-color .2s,transform .2s, opacity 1s ease;
  opacity: 0;
  -webkit-appearance:none;
}
.btn-replay.show {
  opacity: 1;
}
.btn-replay:active{transform:scale(.96);}

/* ── CONFETTI ── */
#confetti{
  position:fixed;inset:0;pointer-events:none;z-index:999;
}
.cf{
  position:absolute;
  width:7px;height:10px;
  border-radius:2px;
  top:-12px;
  animation:cf-fall linear forwards;
}
@keyframes cf-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(105vh) rotate(600deg);opacity:0;}
}

.screen{opacity:0;transition:opacity .5s ease;}
.screen.active{opacity:1;}

@media(prefers-reduced-motion:reduce){
  .reveal-cake,.dot{animation:none!important;}
}
</style>
</head>
<body>

  <source src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3" type="audio/mpeg">
</audio>

<div id="confetti"></div>

<div class="screen active" id="s-intro">

  <div class="envelope-wrap" id="envelope-wrap" onclick="openEnvelope()">

  <div class="game-header">

  <div class="cake-stage" id="cake-stage">

    <div id="placed-toppings"></div>

  <div id="shelf-wrap">

</div>

<div class="screen" id="s-reveal">
  <div class="reveal-cake" id="reveal-cake">🎂</div>
  <p class="reveal-eyebrow">happy birthday</p>
  <h2 class="reveal-name"><em>Bubb</em></h2>
  <div class="reveal-divider"></div>
  
  <p class="reveal-msg" id="dynamic-reveal-msg">
    </p>

  <button class="btn-replay" id="btn-replay" onclick="replay()">↩ Ulangi game</button>
</div>

<script>
/* ── DATA ── */
const TOPPINGS = [
  {emoji:'🍓', label:'strawberry', max:3},
  {emoji:'🫐', label:'blueberry',  max:3},
  {emoji:'🍫', label:'choco',      max:2},
  {emoji:'🌸', label:'sakura',     max:3},
  {emoji:'⭐', label:'star',       max:4},
  {emoji:'🍬', label:'candy',      max:3},
];
const NEEDED = 5; 

const BLOW_REACTIONS = [
  "wish granted (semoga) \xf0\x9f\x8c\xac\xef\xb8\x8f",
  "satu lilin, satu harapan~",
  "asapnya jangan kena mata",
  "cieee niup lilin mulu",
  "oke sisa ini doang ditiup ya"
];

/* ── FUNGSI INTRO (Baru) ── */
function openEnvelope() {
  const env = document.getElementById('envelope-wrap');
  if(env.classList.contains('open')) return; // Mencegah klik dua kali
  
  // Putar lagu Lo-fi
  const audio = document.getElementById('bg-music');
  audio.volume = 0.6; // Set volume sedikit lebih pelan
  audio.play().catch(e => console.log("Auto-play audio dicegah oleh browser"));

  // Buka amplop
  env.classList.add('open');

  // Pindah ke game setelah animasi amplop selesai (0.9 detik)
  setTimeout(() => {
    goGame();
  }, 900);
}

function setupCandles(){
  document.querySelectorAll(".flame-group").forEach(g=>{
    g.classList.remove("blown");
    g.addEventListener("click", onBlowCandle);
    g.addEventListener("touchend", e=>{e.preventDefault(); onBlowCandle({currentTarget:g});}, {passive:false});
  });
}

function spawnSmoke(cx, cy){
  const stage = document.getElementById("cake-stage");
  const rect = stage.getBoundingClientRect();
  const svg = stage.querySelector(".cake-svg");
  const svgRect = svg.getBoundingClientRect();
  const scaleX = svgRect.width / 300;
  const scaleY = svgRect.height / 260;
  const px = (svgRect.left - rect.left) + cx * scaleX;
  const py = (svgRect.top  - rect.top)  + cy * scaleY;

  for(let i=0;i<9;i++){
    const p = document.createElement("div");
    p.className = "smoke-particle";
    const sz = 6 + Math.random()*8;
    const dx  = (Math.random()-0.5)*22 + "px";
    const dx2 = (Math.random()-0.5)*36 + "px";
    const delay = Math.random()*0.25;
    const dur   = 0.9 + Math.random()*0.5;
    p.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${px}px; top:${py}px;
      --dx:${dx}; --dx2:${dx2};
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    stage.appendChild(p);
    setTimeout(()=>p.remove(), (dur+delay+0.1)*1000);
  }
}

function onBlowCandle(e){
  if(placed < NEEDED){
    const el = document.getElementById("reaction-bubble");
    el.textContent = "Hias kuenya sampai selesai dulu ya! 🎂";
    el.classList.remove("show");
    requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("show")));
    return;
  }

  const g = e.currentTarget;
  if(g.classList.contains("blown")) return;
  g.classList.add("blown");

  const flamePositions = [{x:136,y:29},{x:164,y:29}];
  const idx = parseInt(g.dataset.flame);
  const fp = flamePositions[idx];
  spawnSmoke(fp.x, fp.y);

  const el = document.getElementById("reaction-bubble");
  const msg = BLOW_REACTIONS[Math.floor(Math.random()*BLOW_REACTIONS.length)];
  el.textContent = msg;
  el.classList.remove("show");
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("show")));
  clearTimeout(window._reactTimeout);
  window._reactTimeout = setTimeout(()=>el.classList.remove("show"), 1600);

  const stage = document.getElementById("cake-stage");
  const fx = document.createElement("div");
  fx.className = "candle-fx";
  fx.textContent = "✨";
  const leftPct = [45, 55][idx];
  fx.style.left = leftPct + "%";
  fx.style.top  = "18%";
  stage.appendChild(fx);
  setTimeout(()=>fx.remove(), 900);

  const allBlown = [...document.querySelectorAll(".flame-group")].every(f=>f.classList.contains("blown"));
  if(allBlown){
    shootConfetti();
    document.getElementById("candle-hint").classList.remove("show");
    setTimeout(()=>goReveal(), 1200);
  }
}

const REACTIONS = [
  'wah cantik! 😍',
  'iya gitu dong~',
  'kuenya makin lapar dipandang 👀',
  'satu lagi, satu lagi!',
  'tangan emas terdeteksi ✨',
  'enak ini kalau beneran',
  'koki bersertifikat lewat',
  'hmm... selera tinggi',
  'cantik bgt kayak yang hias',
  'oke ini udah masuk galeri',
];

function showReaction(){
  const el = document.getElementById('reaction-bubble');
  const msg = REACTIONS[Math.floor(Math.random()*REACTIONS.length)];
  el.textContent = msg;
  el.classList.remove('show');
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>el.classList.add('show'));
  });
  clearTimeout(window._reactTimeout);
  window._reactTimeout = setTimeout(()=>el.classList.remove('show'), 1600);
}

let selected = null;
let placed   = 0;
let counts   = {};

(function(){
  const bg = document.getElementById('dot-bg');
  for(let i=0;i<18;i++){
    const d = document.createElement('div');
    d.className = 'dot';
    const s = 30+Math.random()*80;
    d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;
      animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*8}s;`;
    bg.appendChild(d);
  }
})();

function buildShelf(){
  const shelf = document.getElementById('shelf');
  shelf.innerHTML = '';
  counts = {};
  TOPPINGS.forEach((t,i)=>{
    counts[i] = 0;
    const btn = document.createElement('button');
    btn.className = 'topping-btn';
    btn.dataset.idx = i;
    btn.innerHTML = t.emoji;
    btn.addEventListener('click', ()=>selectTopping(i));
    shelf.appendChild(btn);
  });
}

function buildProgress(){
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  for(let i=0;i<NEEDED;i++){
    const p = document.createElement('div');
    p.className = 'pill';
    p.id = `pill-${i}`;
    row.appendChild(p);
  }
}

function selectTopping(idx){
  document.querySelectorAll('.topping-btn').forEach(b=>b.classList.remove('selected'));
  selected = idx;
  document.querySelectorAll('.topping-btn')[idx].classList.add('selected');
}

function setupDropZone(){
  const zone = document.getElementById('drop-zone');
  zone.addEventListener('click', handlePlace);
  zone.addEventListener('touchend', e=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    const rect = zone.getBoundingClientRect();
    handlePlace({offsetX: t.clientX-rect.left, offsetY: t.clientY-rect.top});
  }, {passive:false});
}

function handlePlace(e){
  const stage0 = document.getElementById('cake-stage');
  const rect0  = stage0.getBoundingClientRect();
  const svgX = (e.offsetX / rect0.width) * 300;
  const svgY = (e.offsetY / rect0.height) * 260;
  
  const flamePositions = [{x:136,y:29},{x:164,y:29}];
  for(let i=0;i<flamePositions.length;i++){
    const fp = flamePositions[i];
    if(Math.hypot(svgX-fp.x, svgY-fp.y) < 24){
      const g = document.querySelectorAll('.flame-group')[i];
      if(g && !g.classList.contains('blown')) onBlowCandle({currentTarget:g});
      return;
    }
  }

  const shelfWrap = document.getElementById('shelf-wrap');
  if (shelfWrap.style.opacity === '0') return;

  if(selected === null) return;
  const t = TOPPINGS[selected];
  if(counts[selected] >= t.max) return;

  const stage = document.getElementById('cake-stage');
  const rect  = stage.getBoundingClientRect();
  const x = (e.offsetX / rect.width  * 100).toFixed(1);
  const y = (e.offsetY / rect.height * 100).toFixed(1);

  if(parseFloat(y) < 25 || parseFloat(y) > 95 || parseFloat(x) < 10 || parseFloat(x) > 90) return;

  const el = document.createElement('div');
  el.className = 'placed';
  el.textContent = t.emoji;
  el.style.left = x+'%';
  el.style.top  = y+'%';
  document.getElementById('placed-toppings').appendChild(el);

  counts[selected]++;
  placed++;
  showReaction();

  if(placed <= NEEDED) document.getElementById(`pill-${placed-1}`)?.classList.add('filled');

  if(counts[selected] >= t.max){
    document.querySelectorAll('.topping-btn')[selected].classList.add('used');
    selected = null;
    document.querySelectorAll('.topping-btn').forEach(b=>b.classList.remove('selected'));
  }

  if(placed >= NEEDED){
    document.getElementById('candle-hint').classList.add('show');
    shelfWrap.style.opacity = '0';
    shelfWrap.style.pointerEvents = 'none';
    selected = null;
    document.querySelectorAll('.topping-btn').forEach(b=>b.classList.remove('selected'));
  }
}

function shootConfetti(){
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const cols = ['#c9707a','#f5c6a0','#a8d8c8','#f9d29d','#e8e2df','#ebb99a'];
  for(let i=0;i<50;i++){
    const c = document.createElement('div');
    c.className = 'cf';
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${cols[i%cols.length]};
      animation-duration:${1.6+Math.random()*.8}s;
      animation-delay:${Math.random()*1.2}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    wrap.appendChild(c);
    setTimeout(()=>c.remove(), 3500);
  }
}

function buildRevealCake(){
  const placed = document.getElementById('placed-toppings').children;
  const emojis = [...placed].map(el=>el.textContent).join(' ');
  document.getElementById('reveal-cake').textContent = '🎂';
}

function generateDynamicMessage() {
  // Cari topping yang paling banyak dipakai
  let favIdx = null;
  let maxCount = 0;
  for (const [idx, count] of Object.entries(counts)) {
      if(count > maxCount) {
          maxCount = count;
          favIdx = idx;
      }
  }
  
  // Jika karena suatu hal tidak ada (fallback), pakai kata "spesial"
  let favToppingName = favIdx !== null ? TOPPINGS[favIdx].label : "spesial";
  let favToppingEmoji = favIdx !== null ? TOPPINGS[favIdx].emoji : "✨";

  const msgContainer = document.getElementById('dynamic-reveal-msg');
  
  // String template literal untuk pesan
  msgContainer.innerHTML = `
    Selamat ulang tahun, <strong>Bubb!</strong><br><br>
    Semoga tahun ini penuh hal-hal yang bikin kamu senyum
    tanpa alasan jelas — yang tiba-tiba, yang hangat,
    yang kamu sendiri gak nyangka.<br><br>
    Semoga hari-harimu ke depan bisa semanis kue <span class="highlight">${favToppingName} ${favToppingEmoji}</span> buatanmu barusan ya.<br><br>
    Bubb udah cukup, dan Bubb juga berhak bahagia.
  `;

  // Hilangkan class show dulu (jika replay)
  msgContainer.classList.remove('show');
  document.getElementById('btn-replay').classList.remove('show');

  // Trigger animasi fade-in elegan setelah sedikit delay
  setTimeout(() => {
    msgContainer.classList.add('show');
  }, 600); // 0.6s setelah layar reveal aktif

  // Munculkan tombol replay belakangan
  setTimeout(() => {
    document.getElementById('btn-replay').classList.add('show');
  }, 2500);
}

function goGame(){
  switchScreen('s-intro','s-game');
  buildShelf();
  buildProgress();
  setupDropZone();
  setupCandles();
  
  placed = 0;
  selected = null;
  
  const shelfWrap = document.getElementById('shelf-wrap');
  shelfWrap.style.opacity = '1';
  shelfWrap.style.pointerEvents = 'auto';
  
  document.getElementById('candle-hint').classList.remove('show');
  document.getElementById('placed-toppings').innerHTML = '';
  document.getElementById('reaction-bubble').classList.remove('show');
}

function goReveal(){
  buildRevealCake();
  switchScreen('s-game','s-reveal');
  setTimeout(shootConfetti, 400);
  
  // Panggil fungsi pembuat pesan dinamis
  generateDynamicMessage();
}

function replay(){
  switchScreen('s-reveal','s-game');
  placed = 0;
  selected = null;
  counts = {};
  
  const shelfWrap = document.getElementById('shelf-wrap');
  shelfWrap.style.opacity = '1';
  shelfWrap.style.pointerEvents = 'auto';
  
  document.getElementById('placed-toppings').innerHTML = '';
  document.getElementById('candle-hint').classList.remove('show');
  document.getElementById('reaction-bubble').classList.remove('show');
  
  // Sembunyikan text di layar reveal agar saat balik nanti animasi main lagi
  document.getElementById('dynamic-reveal-msg').classList.remove('show');
  document.getElementById('btn-replay').classList.remove('show');

  setupCandles();
  document.querySelectorAll('.topping-btn').forEach(b=>{
    b.classList.remove('used','selected');
  });
  buildProgress();
}

function switchScreen(fromId, toId){
  const from = document.getElementById(fromId);
  const to   = document.getElementById(toId);
  from.classList.remove('active');
  setTimeout(()=>{
    to.classList.add('active');
    window.scrollTo(0,0);
  }, 300);
}
</script>
